name: Bug report
description: Something classified wrong, a missed secret, or a crash.
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did llmignore do, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Command run, relevant `.llmignore` / `.gitignore`, and the file tree if useful.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `llmignore --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
      placeholder: e.g. macOS 14 arm64, Ubuntu 24.04 x64
    validations:
      required: true
