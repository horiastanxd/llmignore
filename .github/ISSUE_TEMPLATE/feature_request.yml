name: Feature request
description: A new sync target, default rule, command, or idea.
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What should llmignore do that it doesn't yet?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why
      description: The problem it solves. Links to the tool / format welcome (e.g. a new AI tool's ignore file).
    validations:
      required: false
